<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada - Sinal Verde</title>
    <meta name="robots" content="noindex">
    <script>
        (function () {
            var path = window.location.pathname;
            if (/\.html$/i.test(path)) {
                var next = path.replace(/\/index\.html$/i, "/").replace(/\.html$/i, "/");
                window.location.replace(next + window.location.search + window.location.hash);
            }
        })();
    </script>
    <style>
        body {
            align-items: center;
            background: #ffc000;
            color: #241f0f;
            display: flex;
            font-family: Arial, sans-serif;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            text-align: center;
        }

        main {
            max-width: 520px;
            padding: 32px;
        }

        a {
            color: #241f0f;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>Página não encontrada</h1>
        <p>O endereço pode ter mudado. Acesse a página inicial e navegue pelos cursos disponíveis.</p>
        <p><a href="./">Voltar para o início</a></p>
    </main>
</body>
</html>
